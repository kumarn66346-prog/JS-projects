<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    input{
        height: 30px;
        width: 200px;
    }
</style>
<body style="background-color: black; color: aliceblue; display: flex; justify-content: center; align-items: center; flex-direction: column; max-width: 100%;">
    <div class="container">
        <h1 style="text-align: center;">Astrology Insight</h1>
        <form id="astroform" style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
            <br>
            <label for="name">First Name</label>
            <input type="text" id="name" name="name" required>
            <br>
            <label for="surname">Surname</label>
            <input type="text" id="surname" name="surname" required>
            <br>
            <label for="day">Day(DOB)</label>
            <input type="number" id="day" name="day" min="1" max="31">
            <br>
            <label for="month">Month</label>
            <input type="number" id="month" name="month" min="1" max="12">
            <br>
            <label for="year">Year</label>
            <input type="number" id="year" name="year" min="1900" max="2026">
            <br><br>
            <input type="submit" value="Get Insights">
            <div id="result"></div>
        </form>
        <br><br>
    </div>
    
</body>
<script src="first.js"></script>
</html>
